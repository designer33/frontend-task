<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="Contact Management Dashboard — view and manage your contacts" />
  <link rel="icon" href="images/favicon.png" />
  <title>Contact Management Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- App Styles -->
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

  <!--
    ASSUMPTION: This is a single-page application shell.
    In Angular, this would be the app-root host element with <router-outlet>.
    The two main "route components" are:
      - .contacts-panel  → /contacts (ContactListComponent)
      - .details-panel   → /contacts/:id (ContactDetailsComponent)
  -->

  <!-- Loading overlay — shown while initial data fetch is in-flight -->
  <div id="loading-overlay" class="loading-overlay d-none" role="status" aria-live="polite">
    <div class="loading-spinner"></div>
    <p class="mt-3 text-light">Loading contacts…</p>
  </div>

  <!-- App wrapper — flex container for the two-panel layout -->
  <div id="app-wrapper" class="app-wrapper">

    <!-- =====================================================================
         LEFT PANEL — contact-list component
         Angular: <app-contact-list> selector
         ===================================================================== -->
    <aside class="contacts-panel bg-light" aria-label="Contacts list">

      <!-- Panel header -->
      <header class="panel-header d-flex justify-content-between align-items-center p-4 border-bottom border-light">
        <div class="d-flex align-items-center gap-3">
          <!-- Hamburger (reserved for future sidebar nav — SIMPLIFIED) -->
          <button class="btn bg-white rounded-3 border border-light text-light menu-btn" title="Menu" aria-label="Open navigation menu">
            <i class="fa fa-bars" aria-hidden="true"></i>
          </button>
          <h1 class="fs-4 fw-bold mb-0">Contacts</h1>
        </div>
        <!-- Pagination prev / next -->
        <div class="d-flex align-items-center gap-2">
          <button id="prev-btn" class="btn bg-white rounded-3 border border-light text-light menu-btn" title="Previous page" aria-label="Previous page" disabled>
            <i class="fa fa-chevron-left" aria-hidden="true"></i>
          </button>
          <button id="next-btn" class="btn bg-white rounded-3 border border-light text-light menu-btn" title="Next page" aria-label="Next page">
            <i class="fa fa-chevron-right" aria-hidden="true"></i>
          </button>
        </div>
      </header>

      <!-- Search bar -->
      <div class="search-area p-4 pb-2 position-relative">
        <div class="d-flex justify-content-between align-items-center gap-2">
          <div class="search-input-wrap flex-grow-1 position-relative">
            <i class="fa fa-search search-icon text-light" aria-hidden="true"></i>
            <input
              id="search-input"
              type="search"
              class="form-control bg-white border border-light shadow-none search-field"
              placeholder="Search by name or phone…"
              aria-label="Search contacts by name, email or phone"
              autocomplete="off"
            />
          </div>
        </div>
        <small id="contact-count" class="text-light d-block mt-2 ps-1">Loading…</small>

        <!-- Mock data notice — hidden unless API is unreachable -->
        <div id="mock-badge" class="mock-badge d-none" role="alert">
          <i class="fa fa-info-circle me-1" aria-hidden="true"></i>
          Showing demo data — configure mockapi.io URL in js/api.js to use live data
        </div>
      </div>

      <!-- Divider line (purely visual, matches Figma design) -->
      <div class="panel-divider-line" aria-hidden="true"></div>

      <!-- Contact list — rendered dynamically by ContactListComponent -->
      <div id="contact-list" class="contact-list px-3 pb-4" role="list" aria-label="Contact list">
        <!-- Contacts are injected here by app.js -->
        <div class="loading-placeholder py-4 text-center text-light">
          <div class="loading-spinner mx-auto mb-2"></div>
        </div>
      </div>
    </aside>

    <!-- =====================================================================
         RIGHT PANEL — contact-details component
         Angular: <app-contact-details> selector
         ===================================================================== -->
    <main class="details-panel" aria-label="Contact details" aria-live="polite">

      <!-- Back button — mobile only -->
      <button id="detail-back-btn" class="back-btn btn text-light d-md-none" aria-label="Back to contact list">
        <i class="fa fa-arrow-left me-2" aria-hidden="true"></i> Back
      </button>

      <!-- Detail content — rendered dynamically by ContactDetailsComponent -->
      <div id="contact-details" class="contact-details-inner p-4 p-lg-5">
        <!-- Details are injected here by app.js -->
      </div>
    </main>

  </div><!-- /.app-wrapper -->

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

  <!--
    Load order matters — api.js exposes ContactApiService on window,
    tests.js exposes runTests on window,
    app.js consumes both and bootstraps after DOMContentLoaded.
  -->
  <script src="js/api.js"></script>
  <script src="js/tests.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
